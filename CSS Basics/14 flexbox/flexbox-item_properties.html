<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="flexbox-item_properties.css">
    <title>Flexbox Item Properties</title>
</head>
<body>
    <h1>Order</h1>

    <div class="container" id="container01">
        <div id="box1">1</div>
        <div id="box2">2</div>
        <div id="box3">3</div>
        <div id="box4">4</div>
        <div id="box5">5</div>
        <div id="box6">6</div>
        <div id="box7">7</div>
        <div id="box8">8</div>
        <div id="box9">9</div>
        <div id="box10">10</div>
    </div>

    <br><hr><br>

    <h1>Flex Grow and Shrink</h1>

    <h2>Flex Grow - 0</h2>

    <div class="container" id="container02">
        <div class="box" id="box11">1</div>
        <div class="box" id="box21">2</div>
        <div class="box" id="box31">3</div>
        <div class="box" id="box41">4</div>
    </div>

    <h2>Flex Grow - 1</h2>

    <div class="container" id="container02">
        <div class="box1" id="box11">1</div>
        <div class="box1" id="box21">2</div>
        <div class="box1" id="box31">3</div>
        <div class="box1" id="box41">4</div>
    </div>

    <h2>Flex Shrink - 0</h2>
     <div class="containerShrink" id="container03">
        <div class="box2" id="box11">1</div>
        <div class="box2" id="box21">2</div>
        <div class="box2" id="box31">3</div>
        <div class="box2" id="box41">4</div>
    </div>



</body>
</html>
